<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Burger</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="social-icons">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
        </div>
        <div class="logo">
            <img src="assets/images/logo.png" alt="Gourmet Burger Logo">
        </div>
        <button class="btn-order">ORDER ONLINE</button>
    </header>

    <nav class="category-tabs">
        <button class="tab active">Burger</button>
        <button class="tab">Pizza</button>
        <button class="tab">Dessert</button>
    </nav>

    <main class="product-container" id="product-grid"></main>

    <hr class="section-divider">

    <section class="reviews-section">
        <h2 class="section-title">Customer Reviews</h2>
        <div class="reviews-container" id="reviews-grid">
            </div>
    </section>

    <div class="floating-cart">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-count">0</span>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
